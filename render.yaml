services:
  - type: web
    name: ridesharex
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
        placeholder: "Insert MongoDB Connection String (e.g. MongoDB Atlas)"
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
        placeholder: "Cloudinary Name"
      - key: CLOUDINARY_API_KEY
        sync: false
        placeholder: "Cloudinary API Key"
      - key: CLOUDINARY_API_SECRET
        sync: false
        placeholder: "Cloudinary API Secret"
